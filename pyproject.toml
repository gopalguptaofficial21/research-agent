[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by black)
    "B008",  # function calls in default args
]

[tool.ruff.lint.isort]
known-first-party = ["agent"]

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts   = "-v --tb=short"
markers   = [
    "integration: marks tests that hit live APIs (deselect with -m 'not integration')",
]

[tool.bandit]
targets   = ["src"]
skips     = ["B101"]   # allow assert statements in tests

[tool.coverage.run]
source = ["src"]
omit   = ["tests/*"]

[tool.coverage.report]
show_missing = true
fail_under   = 60
