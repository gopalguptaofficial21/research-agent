[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "W", "F"]
ignore = [
    "E501",  # line too long
    "F401",  # unused imports
    "F811",  # redefinition of unused name
    "E402",  # module level import not at top
    "W291",  # trailing whitespace
    "W293",  # whitespace before colon
]

[tool.black]
line-length = 100
target-version = ["py311"]
skip-string-normalization = false

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts   = "-v --tb=short"
markers   = [
    "integration: marks tests that hit live APIs (deselect with -m 'not integration')",
]

[tool.bandit]
targets = ["src"]
skips   = ["B101", "B603", "B607", "B404"]

[tool.coverage.run]
source = ["src"]
omit   = ["tests/*"]

[tool.coverage.report]
show_missing = true
fail_under   = 0
